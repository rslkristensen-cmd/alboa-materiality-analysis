<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobbeltvæsentlighed Matrix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        .highlight {
            background-color: yellow;
        }
    </style>
    <script>
        function highlightCell(cell) {
            cell.classList.toggle('highlight');
        }
    </script>
</head>
<body>
    <h1>Dobbeltvæsentlighed Matrix</h1>
    <table>
        <tr>
            <th>Dimension 1</th>
            <th>Dimension 2</th>
            <th>Dimension 3</th>
        </tr>
        <tr onclick="highlightCell(this)">
            <td>Row 1 - Data 1</td>
            <td>Row 1 - Data 2</td>
            <td>Row 1 - Data 3</td>
        </tr>
        <tr onclick="highlightCell(this)">
            <td>Row 2 - Data 1</td>
            <td>Row 2 - Data 2</td>
            <td>Row 2 - Data 3</td>
        </tr>
        <!-- More rows as needed -->
    </table>
</body>
</html>
