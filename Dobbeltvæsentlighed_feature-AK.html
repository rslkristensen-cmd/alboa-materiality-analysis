<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Dobbelt Væsentlighedsanalyse Matrix Tool</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 20px;\n        }\n        .matrix {\n            width: 600px;\n            height: 600px;\n            border: 1px solid #000;\n            position: relative;\n            background-color: #f9f9f9;\n        }\n        .point {\n            width: 10px;\n            height: 10px;\n            position: absolute;\n            border-radius: 50%;\n        }\n        .environmental {\n            background-color: green;\n        }\n        .social {\n            background-color: red;\n        }\n        .governance {\n            background-color: blue;\n        }\n    </style>\n</head>\n<body>\n    <h1>Dobbelt Væsentlighedsanalyse Matrix Tool</h1>\n    <div class=\"matrix\" id=\"matrix\">\n        <div class=\"point environmental\" id=\"point1\"></div>\n        <div class=\"point social\" id=\"point2\"></div>\n        <div class=\"point governance\" id=\"point3\"></div>\n    </div>\n    <script>\n        // Make points draggable\n        function makeDraggable(element) {\n            element.onmousedown = function(event) {\n                let shiftX = event.clientX - element.getBoundingClientRect().left;\n                let shiftY = event.clientY - element.getBoundingClientRect().top;\n                element.style.position = 'absolute';\n                moveAt(event.pageX, event.pageY);\n                document.body.append(element);\n                element.namedItem = 'draggable';\n                function moveAt(pageX, pageY) {\n                    element.style.left = pageX - shiftX + 'px';\n                    element.style.top = pageY - shiftY + 'px';\n                }\n                function onMouseMove(event) {\n                    moveAt(event.pageX, event.pageY);\n                }\n                document.addEventListener('mousemove', onMouseMove);\n                element.onmouseup = function() {\n                    document.removeEventListener('mousemove', onMouseMove);\n                    element.onmouseup = null;\n                };\n            };\n            element.ondragstart = function() {\n                return false;\n            };\n        }\n        // Apply draggable feature to all points\n        let points = document.querySelectorAll('.point');\n        points.forEach(point => makeDraggable(point));\n        // Save positions to local storage\n        function savePositions() {\n            let positions = [];\n            points.forEach(point => {\n                let rect = point.getBoundingClientRect();\n                positions.push({\n                    id: point.id,\n                    left: rect.left,\n                    top: rect.top\n                });\n            });\n            localStorage.setItem('matrixPositions', JSON.stringify(positions));\n        }\n        // Restore positions from local storage\n        function restorePositions() {\n            let positions = JSON.parse(localStorage.getItem('matrixPositions'));\n            if (positions) {\n                positions.forEach(pos => {\n                    let point = document.getElementById(pos.id);\n                    point.style.left = pos.left + 'px';\n                    point.style.top = pos.top + 'px';\n                });\n            }\n        }\n        restorePositions();\n        window.addEventListener('beforeunload', savePositions);\n    </script>\n</body>\n</html>\n
